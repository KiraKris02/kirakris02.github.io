<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CubiX V2</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0a0f1c, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, monospace;
            padding: 20px;
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 24px;
        }

        .canvas-area {
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 32px;
            box-shadow: 0 0 0 2px #ffdd88, 0 20px 35px black;
            cursor: pointer;
            background: #0a1022;
        }

        .game-ui {
            position: absolute;
            top: 20px;
            left: 25px;
            right: 25px;
            bottom: 20px;
            pointer-events: none;
        }

        .score-badge {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 100px;
            border-left: 4px solid #ffbb44;
        }
        .score-badge span:first-child {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #ffdd99;
        }
        .score-badge span:last-child {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFA53D);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-left: 8px;
        }

        .lives-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 1.4rem;
            display: flex;
            gap: 6px;
        }

        .xp-bar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: #03060ecc;
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #ffb34770;
        }
        .xp-label {
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffdfaa;
        }
        .xp-track {
            flex: 1;
            height: 10px;
            background: #2a241c;
            border-radius: 20px;
            overflow: hidden;
        }
        .xp-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f5a623, #ffe08c);
            border-radius: 20px;
            transition: width 0.12s;
        }
        .level-chip {
            background: #ffaa33;
            padding: 2px 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.7rem;
            color: #1a1408;
        }

        .difficulty-panel {
            background: rgba(10, 18, 30, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px 24px;
            min-width: 210px;
            border: 1px solid #ffb347;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .difficulty-title {
            color: #ffdd99;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }
        .diff-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .diff-btn {
            background: #1f2a3e;
            border: none;
            padding: 8px 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            color: #ffd8a5;
            transition: 0.1s;
            font-family: inherit;
        }
        .diff-btn.active {
            background: #f5a623;
            color: #1e1a0c;
            box-shadow: 0 0 10px #ffaa33;
        }
        .newgame-btn {
            background: linear-gradient(95deg, #3a8c5a, #236b42);
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 0;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 3px 0 #1a452c;
            color: #ffffff;
        }
        .restart-btn {
            background: linear-gradient(95deg, #f3a25b, #e07c2c);
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 0;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.07s linear;
            box-shadow: 0 3px 0 #78461a;
            color: #2b1a07;
        }
        .restart-btn:active, .newgame-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #78461a;
        }
        .tip {
            font-size: 0.65rem;
            text-align: center;
            color: #bbddff;
            margin-top: 12px;
        }
        
        .auth-panel {
            background: #0e1a28cc;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffddbb;
            font-size: 0.8rem;
        }
        .logout-btn {
            background: #ff6644;
            border: none;
            border-radius: 60px;
            padding: 4px 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0a111ecc;
            padding: 12px;
            border-radius: 36px;
        }
        .login-form input {
            background: #1f2a3e;
            border: none;
            padding: 8px 12px;
            border-radius: 60px;
            color: #ffefcf;
            outline: none;
            font-size: 0.8rem;
        }
        .login-form button {
            background: #ffaa33;
            border: none;
            border-radius: 60px;
            padding: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .saved-badge {
            font-size: 0.65rem;
            color: #aaffaa;
            text-align: center;
        }
        .error-msg {
            color: #ff8866;
            font-size: 0.7rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="canvas-area">
        <canvas id="gameCanvas" width="720" height="540"></canvas>
        <div class="game-ui">
            <div class="score-badge">
                <span>★ SCORE ★</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="lives-badge" id="livesDisplay">❤️❤️❤️❤️</div>
            <div class="xp-bar">
                <span class="xp-label">⚡ XP</span>
                <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
                <div class="level-chip" id="levelText">LVL 1</div>
            </div>
        </div>
    </div>

    <div class="difficulty-panel">
        <div class="difficulty-title">⚙️ СЛОЖНОСТЬ</div>
        <div class="diff-buttons">
            <button class="diff-btn" data-diff="easy">🍃 ЛЁГКИЙ</button>
            <button class="diff-btn active" data-diff="medium">⚡ СРЕДНИЙ</button>
            <button class="diff-btn" data-diff="hard">🔥 СЛОЖНЫЙ</button>
        </div>
        
        <div id="authContainer">
            <div id="loginForm" class="login-form">
                <input type="text" id="loginUsername" placeholder="Логин" autocomplete="off">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="doLoginBtn">🔑 Войти</button>
                <button id="doRegisterBtn" style="background:#4a6a8a;">📝 Регистрация</button>
                <div id="loginError" class="error-msg"></div>
            </div>
            <div id="userPanel" style="display: none;" class="auth-panel">
                <div class="user-info">
                    <span>👤</span>
                    <span id="currentUsername"></span>
                </div>
                <button id="logoutLocalBtn" class="logout-btn">🚪 Выйти</button>
            </div>
        </div>
        
        <div class="saved-badge" id="saveIndicator">💾 Прогресс сохраняется</div>
        <button class="newgame-btn" id="newGameBtn">🔄 НОВАЯ ИГРА (без сброса прогресса)</button>
        <div class="tip">🖱️ КЛИК ПО КУБИКУ — УНИЧТОЖИТЬ<br>❌ ПРОПУЩЕННЫЙ БЛОК = −XP</div>
    </div>
</div>

<script>
    (function(){
        // ---------- ИГРОВОЕ ПОЛЕ ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width = 720;
        const H = canvas.height = 540;
        
        // ---------- ИГРОВЫЕ ПЕРЕМЕННЫЕ ----------
        let gameActive = true;
        let score = 0;
        let level = 1;
        let xp = 0;
        let xpNeeded = 110;
        let lives = 4;
        
        let cubes = [];
        let particles = [];
        let combo = 0;
        let lastDestroyTime = 0;
        let glowIntensity = 0;
        
        let currentDifficulty = "medium";
        let baseSpeed = 2.2;
        let spawnBaseDelay = 24;
        let spawnCounter = 0;
        let speedMultiplier = 1.0;
        
        let animationId = null;
        
        const MIN_SIZE = 28;
        const MAX_SIZE = 68;
        const COLORS = [
            "#FF5277", "#FFB347", "#4D9DE0", "#55D6C2", "#F4D58C",
            "#B980EA", "#7C77B9", "#5D9B6B", "#FF8C69", "#3BC9DB",
            "#FF70B8", "#F6AE9A", "#CE84AD"
        ];
        
        // ---------- СИСТЕМА ПОЛЬЗОВАТЕЛЕЙ ----------
        let currentUser = null;
        
        function getUsers() {
            const raw = localStorage.getItem("cubeclicker_users");
            try { return raw ? JSON.parse(raw) : {}; } catch(e) { return {}; }
        }
        
        function saveUsers(users) {
            localStorage.setItem("cubeclicker_users", JSON.stringify(users));
        }
        
        function saveUserProgress() {
            if (!currentUser) return;
            const users = getUsers();
            if (users[currentUser.username]) {
                users[currentUser.username] = {
                    password: users[currentUser.username].password,
                    score: score,
                    level: level,
                    xp: xp,
                    xpNeeded: xpNeeded,
                    difficulty: currentDifficulty,
                    lives: lives
                };
                saveUsers(users);
                const ind = document.getElementById('saveIndicator');
                ind.style.color = "#aaffaa";
                ind.innerHTML = "💾 Сохранено!";
                setTimeout(() => {
                    if (ind) ind.innerHTML = "💾 Прогресс сохраняется автоматически";
                }, 1200);
            }
        }
        
        function loadUserProgress() {
            if (!currentUser) return false;
            const users = getUsers();
            const data = users[currentUser.username];
            if (!data) return false;
            score = data.score || 0;
            level = data.level || 1;
            xp = data.xp || 0;
            xpNeeded = data.xpNeeded || 110;
            lives = data.lives !== undefined ? data.lives : 4;
            currentDifficulty = data.difficulty || "medium";
            setDifficultyUI(currentDifficulty);
            applyDifficulty();
            updateUI();
            return true;
        }
        
        function register(username, password) {
            if (!username || !password) return "Заполните логин и пароль";
            const users = getUsers();
            if (users[username]) return "Пользователь уже существует";
            users[username] = {
                password: password,
                score: 0,
                level: 1,
                xp: 0,
                xpNeeded: 110,
                difficulty: "medium",
                lives: 4
            };
            saveUsers(users);
            return null;
        }
        
        function login(username, password) {
            const users = getUsers();
            const user = users[username];
            if (!user) return "Неверный логин";
            if (user.password !== password) return "Неверный пароль";
            currentUser = { username: username };
            return null;
        }
        
        function logout() {
            currentUser = null;
            // Сброс до значений по умолчанию
            score = 0;
            level = 1;
            xp = 0;
            xpNeeded = 110;
            lives = 4;
            currentDifficulty = "medium";
            setDifficultyUI("medium");
            applyDifficulty();
            updateUI();
            restartGame();
            document.getElementById('loginForm').style.display = "flex";
            document.getElementById('userPanel').style.display = "none";
        }
        
        function setDifficultyUI(diff) {
            document.querySelectorAll('.diff-btn').forEach(btn => {
                if(btn.getAttribute('data-diff') === diff) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        function autoSave() {
            if (currentUser) saveUserProgress();
        }
        
        // ---------- ИГРОВАЯ ЛОГИКА ----------
        function applyDifficulty() {
            switch(currentDifficulty) {
                case "easy":
                    baseSpeed = 1.5;
                    spawnBaseDelay = 34;
                    break;
                case "medium":
                    baseSpeed = 2.1;
                    spawnBaseDelay = 25;
                    break;
                case "hard":
                    baseSpeed = 2.9;
                    spawnBaseDelay = 18;
                    break;
            }
            for(let c of cubes) {
                let sizeFactor = 1.2 - (c.size / MAX_SIZE) * 0.5;
                c.speedY = (baseSpeed * speedMultiplier) * (0.75 + sizeFactor * 0.7);
            }
        }
        
        function random(min, max) { return min + Math.random() * (max - min); }
        function randomColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }
        
        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            let percent = (xp / xpNeeded) * 100;
            document.getElementById('xpFill').style.width = Math.min(100, percent) + "%";
            document.getElementById('levelText').innerHTML = `LVL ${level}`;
            let hearts = "";
            for(let i=0; i<lives; i++) hearts += "❤️ ";
            for(let i=lives; i<4; i++) hearts += "🖤 ";
            document.getElementById('livesDisplay').innerHTML = hearts;
            speedMultiplier = 1 + (level-1) * 0.16;
            applyDifficulty();
        }
        
        function addPoints(amount) {
            if(!gameActive) return;
            let comboBonus = Math.floor(amount * 0.12 * combo);
            let total = amount + comboBonus;
            score += total;
            xp += total;
            while(xp >= xpNeeded && gameActive) {
                xp -= xpNeeded;
                level++;
                xpNeeded = Math.floor(100 + (level-1) * 28);
                if(xpNeeded > 400) xpNeeded = 400;
                levelUpEffect();
            }
            updateUI();
            autoSave();
        }
        
        function penalizeXp(amount = 28) {
            if(!gameActive) return;
            xp -= amount;
            if(xp < 0) {
                gameActive = false;
                if(animationId) cancelAnimationFrame(animationId);
                animationId = null;
                draw();
                return;
            }
            updateUI();
            autoSave();
            canvas.style.filter = "brightness(0.85)";
            setTimeout(()=> canvas.style.filter = "", 120);
        }
        
        function loseLife() {
            if(!gameActive) return;
            lives--;
            updateUI();
            combo = 0;
            canvas.style.transform = "translateX(4px)";
            setTimeout(()=> canvas.style.transform = "", 80);
            if(lives <= 0) {
                gameActive = false;
                if(animationId) cancelAnimationFrame(animationId);
                animationId = null;
                draw();
                return;
            }
            autoSave();
        }
        
        function levelUpEffect() {
            for(let i=0;i<35;i++) {
                particles.push({
                    x: W/2, y: H/2,
                    vx: (Math.random()-0.5)*7, vy: (Math.random()-0.8)*6-2,
                    life: 0.9, size: 4+Math.random()*10,
                    color: `hsl(${Math.random()*50+35}, 95%, 65%)`
                });
            }
            canvas.style.filter = "drop-shadow(0 0 6px gold) brightness(1.15)";
            setTimeout(()=> canvas.style.filter = "", 200);
        }
        
        function addExplosion(cx, cy, size, baseColor) {
            let count = Math.min(24, Math.floor(size/3)+7);
            for(let i=0;i<count;i++) {
                particles.push({
                    x: cx, y: cy,
                    vx: (Math.random()-0.5)*7.5, vy: (Math.random()-1)*5.8-2,
                    life: 1.0, size: 3+Math.random()*9,
                    color: baseColor
                });
            }
        }
        
        function spawnCube() {
            if(!gameActive) return;
            const size = random(MIN_SIZE, MAX_SIZE);
            const x = random(12, W - size - 12);
            const y = -size;
            const color = randomColor();
            let sizeFactor = 1.2 - (size / MAX_SIZE) * 0.5;
            let speedY = (baseSpeed * speedMultiplier) * (0.75 + sizeFactor * 0.7);
            cubes.push({ x, y, size, color, speedY });
        }
        
        function updateCubes() {
            for(let i=0; i<cubes.length; i++) {
                const c = cubes[i];
                c.y += c.speedY;
                if(c.y + c.size >= H) {
                    loseLife();
                    addExplosion(c.x + c.size/2, H-20, c.size, "#aa5555");
                    cubes.splice(i,1);
                    i--;
                    if(!gameActive) break;
                }
            }
        }
        
        function destroyAt(px, py) {
            if(!gameActive) return false;
            for(let i=cubes.length-1; i>=0; i--) {
                const c = cubes[i];
                if(px >= c.x && px <= c.x + c.size && py >= c.y && py <= c.y + c.size) {
                    let basePoints = Math.floor((MAX_SIZE - c.size + 12) * 1.35) + 10;
                    basePoints = Math.max(28, basePoints);
                    addPoints(basePoints);
                    addExplosion(c.x + c.size/2, c.y + c.size/2, c.size, c.color);
                    cubes.splice(i,1);
                    
                    let now = Date.now();
                    if(now - lastDestroyTime < 550) {
                        combo++;
                        if(combo > 8) combo = 8;
                    } else {
                        combo = 1;
                    }
                    lastDestroyTime = now;
                    glowIntensity = 1.0;
                    
                    canvas.style.transform = "scale(0.98)";
                    setTimeout(()=> canvas.style.transform = "", 45);
                    return true;
                }
            }
            if(Date.now() - lastDestroyTime > 600) combo = 0;
            if(glowIntensity > 0) glowIntensity -= 0.05;
            return false;
        }
        
        function handleSpawning() {
            if(!gameActive) return;
            let dynamicDelay = Math.max(9, spawnBaseDelay - Math.floor(level * 0.5));
            if(spawnCounter <= 0) {
                let count = 1;
                if(level > 4 && Math.random()<0.4 && currentDifficulty !== "easy") count = 2;
                for(let i=0;i<count;i++) spawnCube();
                spawnCounter = dynamicDelay;
            } else {
                spawnCounter--;
            }
        }
        
        function updateParticles() {
            for(let i=0; i<particles.length; i++) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.size *= 0.98;
                if(p.life <= 0 || p.size < 0.7) {
                    particles.splice(i,1);
                    i--;
                }
            }
        }
        
        // ---------- ОТРИСОВКА ----------
        function shadeColor(col, percent) {
            if(!col.startsWith('#')) return col;
            let r = parseInt(col.slice(1,3),16);
            let g = parseInt(col.slice(3,5),16);
            let b = parseInt(col.slice(5,7),16);
            r = Math.min(255, Math.max(0, r + (r*percent)/100));
            g = Math.min(255, Math.max(0, g + (g*percent)/100));
            b = Math.min(255, Math.max(0, b + (b*percent)/100));
            return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
        }
        
        function drawCube(c) {
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = c.color + "aa";
            const grad = ctx.createLinearGradient(c.x, c.y, c.x+c.size, c.y+c.size);
            grad.addColorStop(0, c.color);
            grad.addColorStop(1, shadeColor(c.color, -22));
            ctx.fillStyle = grad;
            ctx.fillRect(c.x, c.y, c.size, c.size);
            ctx.strokeStyle = shadeColor(c.color, 25);
            ctx.lineWidth = 1.5;
            ctx.strokeRect(c.x+1, c.y+1, c.size-2, c.size-2);
            ctx.fillStyle = "rgba(255,250,210,0.55)";
            ctx.fillRect(c.x+4, c.y+4, c.size-10, 5);
            ctx.fillStyle = "rgba(255,255,245,0.3)";
            ctx.fillRect(c.x+2, c.y+c.size-8, c.size-6, 3);
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath();
            ctx.arc(c.x + c.size*0.3, c.y + c.size*0.4, c.size*0.09, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(c.x + c.size*0.7, c.y + c.size*0.4, c.size*0.09, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#1f1a10";
            ctx.beginPath();
            ctx.arc(c.x + c.size*0.28, c.y + c.size*0.38, c.size*0.045, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(c.x + c.size*0.68, c.y + c.size*0.38, c.size*0.045, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(c.x + c.size*0.5, c.y + c.size*0.62, c.size*0.1, 0.05, Math.PI - 0.05);
            ctx.strokeStyle = "#442200";
            ctx.lineWidth = Math.max(2, c.size*0.055);
            ctx.stroke();
            ctx.restore();
        }
        
        function drawBackground() {
            const grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0, "#0c1126");
            grad.addColorStop(1, "#18223c");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,W,H);
            for(let i=0;i<100;i++) {
                ctx.fillStyle = `rgba(255,220,150,${0.15+Math.sin(Date.now()*0.001+i)*0.05})`;
                ctx.fillRect( (i*131)%W, (i*73)%H, 1.5,1.5);
            }
            if(glowIntensity > 0) {
                ctx.globalAlpha = 0.12 * glowIntensity;
                ctx.fillStyle = "#ffaa66";
                ctx.fillRect(0,0,W,H);
                ctx.globalAlpha = 1;
            }
        }
        
        function drawParticles() {
            for(let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }
        
        function drawGameOver() {
            if(!gameActive) {
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0,0,W,H);
                ctx.font = "800 36px 'Segoe UI'";
                ctx.fillStyle = "#ffcf8a";
                ctx.fillText("GAME OVER", W/2-110, H/2-20);
                ctx.font = "16px monospace";
                ctx.fillStyle = "#ddb982";
                ctx.fillText("нажмите «НОВАЯ ИГРА»", W/2-100, H/2+45);
            }
        }
        
        function draw() {
            drawBackground();
            for(let c of cubes) drawCube(c);
            drawParticles();
            drawGameOver();
        }
        
        // ---------- УПРАВЛЕНИЕ ----------
        function handleCanvasClick(e) {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width / rect.width;
            const sy = canvas.height / rect.height;
            let mx, my;
            if(e.touches) {
                mx = (e.touches[0].clientX - rect.left) * sx;
                my = (e.touches[0].clientY - rect.top) * sy;
                e.preventDefault();
            } else {
                mx = (e.clientX - rect.left) * sx;
                my = (e.clientY - rect.top) * sy;
            }
            destroyAt(mx, my);
        }
        
        function setDifficulty(diff) {
            currentDifficulty = diff;
            applyDifficulty();
            setDifficultyUI(diff);
            if (currentUser) autoSave();
            restartGame(); // перезапуск с новой сложностью, но прогресс не сбрасывается
        }
        
        function restartGame() {
            if(animationId) cancelAnimationFrame(animationId);
            gameActive = true;
            cubes = [];
            particles = [];
            combo = 0;
            glowIntensity = 0;
            spawnCounter = 3;
            // Восстанавливаем жизни до 4, но очки/уровень/XP не трогаем!
            lives = 4;
            updateUI();
            applyDifficulty();
            for(let i=0;i<4;i++) spawnCube();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Новая игра без сброса прогресса (очистка поля + восстановление жизней)
        function newGameNoReset() {
            if (!gameActive) {
                // если игра закончена, перезапускаем с теми же очками
                gameActive = true;
            }
            cubes = [];
            particles = [];
            combo = 0;
            glowIntensity = 0;
            lives = 4;
            updateUI();
            restartGame(); // restartGame уже делает очистку и запуск
        }
        
        // ---------- ЦИКЛ ----------
        function gameUpdate() {
            if(!gameActive) return;
            handleSpawning();
            updateCubes();
            updateParticles();
            if(glowIntensity > 0) glowIntensity -= 0.02;
        }
        
        function gameLoop() {
            gameUpdate();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ---------- АВТОРИЗАЦИЯ UI ----------
        function initAuthUI() {
            const loginFormDiv = document.getElementById('loginForm');
            const userPanelDiv = document.getElementById('userPanel');
            const usernameSpan = document.getElementById('currentUsername');
            
            document.getElementById('doLoginBtn').onclick = () => {
                const user = document.getElementById('loginUsername').value.trim();
                const pass = document.getElementById('loginPassword').value;
                const err = login(user, pass);
                if (err) {
                    document.getElementById('loginError').innerText = err;
                    return;
                }
                document.getElementById('loginError').innerText = "";
                loadUserProgress();
                updateUI();
                restartGame();
                loginFormDiv.style.display = "none";
                userPanelDiv.style.display = "flex";
                usernameSpan.innerText = currentUser.username;
            };
            
            document.getElementById('doRegisterBtn').onclick = () => {
                const user = document.getElementById('loginUsername').value.trim();
                const pass = document.getElementById('loginPassword').value;
                const err = register(user, pass);
                if (err) {
                    document.getElementById('loginError').innerText = err;
                    return;
                }
                document.getElementById('loginError').innerText = "Регистрация успешна! Вход...";
                const err2 = login(user, pass);
                if (!err2) {
                    loadUserProgress();
                    updateUI();
                    restartGame();
                    loginFormDiv.style.display = "none";
                    userPanelDiv.style.display = "flex";
                    usernameSpan.innerText = currentUser.username;
                }
            };
            
            document.getElementById('logoutLocalBtn').onclick = () => {
                logout();
                loginFormDiv.style.display = "flex";
                userPanelDiv.style.display = "none";
                document.getElementById('loginUsername').value = "";
                document.getElementById('loginPassword').value = "";
            };
        }
        
        // ---------- ЗАПУСК ----------
        function init() {
            initAuthUI();
            restartGame();
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCanvasClick(e);
            });
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const diff = btn.getAttribute('data-diff');
                    setDifficulty(diff);
                });
            });
            document.getElementById('newGameBtn').addEventListener('click', () => newGameNoReset());
        }
        
        init();
    })();
</script>
</body>
</html>
